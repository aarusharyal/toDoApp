<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/style.css">
</head>

<body>

    <main class="app-shell">
        <div class="todo-app" id="todo-app">
            <header class="app-header">
                <span class="app-eyebrow">Aarush</span>
                <h1 class="app-title" id="app-title">To-Do List</h1>
                <p class="appDate" id="appDate"></p>
            </header>

            <!-- ============ TASK INPUT SECTION ============ -->
            <!-- JS: Add tasks — on submit, preventDefault(), read #task-input and #task-date,
           push a new task object into the tasks array, then re-render #task-list -->
            <section class="task-input-section" aria-label="Add a new task">
                <form id="taskForm" class="task-form" novalidate method="">

                    <div class="field-group field-group--text">
                        <label for="taskInput" class="visually-hidden">Task name</label>
                        <input type="text" id="taskInput" name="task-input" class="task-input"
                            placeholder="What needs to get done?" autocomplete="off" required>
                    </div>

                    <div class="field-group field-group--date">
                        <label for="taskDate" class="visually-hidden">Due date</label>
                        <input type="date" id="taskDate" name="task-date" class="task-date-input">
                    </div>

                    <button type="submit" id="addTaskBtn" class="btn btn--primary">
                        <span class="btn-label">Add Task</span>
                    </button>

                </form>
            </section>

            <!-- ============ TASK CONTROLS ============ -->
            <section class="task-controls" aria-label="Task controls">

                <div class="sort-control">
                    <label for="sort-select" class="sort-label">Sort By</label>
                    <!-- JS: Sort tasks — on change, read this value ("date-desc" / "date-asc"),
               reorder the tasks array by due date, then re-render #task-list -->
                    <select id="sort-select" name="sort-select" class="sort-select">
                        <option value="date-desc">Date (Newest First)</option>
                        <option value="date-asc">Date (Oldest First)</option>
                        <option value="time-added">Time Added</option>
                    </select>
                </div>

                <!-- JS: Update this number whenever a task is added or deleted -->
                <div class="task-counter" id="task-counter">
                    <span class="task-counter-number" id="task-count">4</span>
                    <span class="task-counter-label">tasks</span>
                </div>

            </section>

            <!-- ============ TASK LIST ============ -->
            <section class="task-list-section" aria-label="Task list">

                <!-- JS: Render — this <ul> is the render target. On every add / delete / sort
             action, clear its contents and rebuild the <li> elements from the tasks array -->
                <ul class="task-list" id="taskList">
                    <!-- JS: Delete — each .delete-btn should read the closest .task-item's
               data-id and remove that task from the array, then re-render -->
                    <li class="task-item" data-id="sample-1" id="userTasks">
                        <input type="checkbox" class="task-status" id="task-status-1"
                            aria-label="Mark 'Reply to internship application emails' complete">
                        <div class="task-details">
                            <span class="task-name">Some Random Task</span>
                            <span class="task-due"><span class="task-due-icon" aria-hidden="true"></span>Jul 10,
                                2026</span>
                        </div>
                        <button type="button" class="delete-btn" id="delete-btn-1"
                            aria-label="Delete task: Reply to internship application emails">&times;</button>
                    </li>
                </ul>

                <!-- JS: Toggle visibility of this element — show it only when the tasks array is empty -->
                <p class="empty-state" id="empty-state" hidden>Nothing on your list yet. Add a task above to get
                    started.</p>

            </section>

            <!-- ============ FOOTER ============ -->
            <footer class="app-footer">
                <!-- JS: Update this count to reflect tasks whose checkbox is unchecked -->
                <p class="footer-note"><span id="tasks-remaining-count">3</span> tasks remaining</p>
            </footer>

        </div>
    </main>
    <script src="/app.js"></script>
</body>

</html>
